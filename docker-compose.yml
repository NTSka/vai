services:
  postgres:
    image: postgres:17-alpine
    container_name: vai2-postgres
    environment:
      POSTGRES_DB: vai2
      POSTGRES_USER: vai2
      POSTGRES_PASSWORD: vai2_password
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vai2 -d vai2"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: vai2-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: vai2-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do
        sleep 2;
      done &&
      mc mb --ignore-existing local/vai-local-files &&
      mc anonymous set none local/vai-local-files
      "

  cv-ocr-service:
    build:
      context: .
      dockerfile: apps/cv-ocr-service/Dockerfile
    container_name: vai2-cv-ocr-service
    environment:
      CV_OCR_SERVICE_ADDRESS: "[::]:50051"
      CV_OCR_OCR_MAX_WORKERS: "${CV_OCR_OCR_MAX_WORKERS:-8}"
      CV_OCR_TESSERACT_LANGUAGES: "${CV_OCR_TESSERACT_LANGUAGES:-rus+eng}"
      CV_OCR_TESSERACT_TIMEOUT_SECONDS: "${CV_OCR_TESSERACT_TIMEOUT_SECONDS:-30}"
      OMP_THREAD_LIMIT: "${OMP_THREAD_LIMIT:-1}"
    ports:
      - "${CV_OCR_SERVICE_PORT:-50051}:50051"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('127.0.0.1', 50051), 2); s.close()"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres-data:
  minio-data:
