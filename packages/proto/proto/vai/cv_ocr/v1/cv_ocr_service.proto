syntax = "proto3";

package vai.cv_ocr.v1;

service CvOcrService {
  rpc CheckHealth(CheckHealthRequest) returns (CheckHealthResponse);
  rpc ExtractPdfMetadata(ExtractPdfMetadataRequest) returns (ExtractPdfMetadataResponse);
  rpc ExtractPdfTextLayer(ExtractPdfTextLayerRequest) returns (ExtractPdfTextLayerResponse);
  rpc RenderPdfPages(RenderPdfPagesRequest) returns (RenderPdfPagesResponse);
}

message CheckHealthRequest {}

message CheckHealthResponse {
  string status = 1;
  string service = 2;
  string version = 3;
}

message TechnicalFileRef {
  string document_version_id = 1;
  string stored_file_id = 2;
  string original_name = 3;
  string mime_type = 4;
  int64 size_bytes = 5;
  string checksum = 6;
  string checksum_algorithm = 7;
}

message InlineFileSource {
  bytes content = 1;
}

message PdfOperationContext {
  TechnicalFileRef file = 1;
  InlineFileSource source = 2;
  string operation = 3;
  string correlation_id = 4;
}

message Diagnostic {
  string code = 1;
  string message = 2;
  string severity = 3;
}

message PdfPageMetadata {
  int32 page_number = 1;
  double width_points = 2;
  double height_points = 3;
  double rotation_degrees = 4;
}

message PdfMetadata {
  int32 page_count = 1;
  bool encrypted = 2;
  string title = 3;
  string author = 4;
  repeated PdfPageMetadata pages = 5;
}

message ExtractPdfMetadataRequest {
  PdfOperationContext context = 1;
}

message ExtractPdfMetadataResponse {
  string adapter_id = 1;
  string adapter_version = 2;
  PdfMetadata metadata = 3;
  repeated Diagnostic diagnostics = 4;
}

message BoundingBox {
  int32 page_number = 1;
  double x = 2;
  double y = 3;
  double width = 4;
  double height = 5;
  string coordinate_system = 6;
}

message PdfTextWord {
  string text = 1;
  BoundingBox bbox = 2;
  int32 block_index = 3;
  int32 line_index = 4;
  int32 word_index = 5;
}

message PdfTextPage {
  int32 page_number = 1;
  string text = 2;
  repeated PdfTextWord words = 3;
}

message ExtractPdfTextLayerRequest {
  PdfOperationContext context = 1;
}

message ExtractPdfTextLayerResponse {
  string adapter_id = 1;
  string adapter_version = 2;
  repeated PdfTextPage pages = 3;
  repeated Diagnostic diagnostics = 4;
}

message RenderProfile {
  int32 dpi = 1;
  string image_format = 2;
  int64 max_page_pixels = 3;
}

message RenderPdfPagesRequest {
  PdfOperationContext context = 1;
  RenderProfile profile = 2;
}

message RenderedPdfPage {
  int32 page_number = 1;
  int32 width_px = 2;
  int32 height_px = 3;
  int32 dpi = 4;
  string image_format = 5;
  string sha256 = 6;
  int64 size_bytes = 7;
  bytes content = 8;
}

message RenderPdfPagesResponse {
  string adapter_id = 1;
  string adapter_version = 2;
  repeated RenderedPdfPage pages = 3;
  repeated Diagnostic diagnostics = 4;
}
